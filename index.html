<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lifeline">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230a0a0a' width='100' height='100' rx='20'/><text y='70' x='50' text-anchor='middle' font-size='60'>🛡️</text></svg>">
<title>Lifeline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1c1c1c;
  --border: #2a2a2a;
  --text: #e8e8e8;
  --text2: #888;
  --accent: #22c55e;
  --accent-dim: rgba(34,197,94,0.15);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.15);
  --orange: #f97316;
  --orange-dim: rgba(249,115,22,0.15);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.15);
  --yellow: #eab308;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column;
  overflow: hidden;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* HEADER */
.header {
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}

.header-left { display: flex; align-items: center; gap: 10px; }

.header-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--accent-dim); display: flex;
  align-items: center; justify-content: center; font-size: 20px;
}

.header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.header .offline-badge {
  font-size: 11px; font-weight: 600; color: var(--accent);
  background: var(--accent-dim); padding: 3px 8px;
  border-radius: 6px; letter-spacing: 0.3px;
}

/* EMERGENCY BAR */
.emergency-bar {
  padding: 8px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; gap: 8px; overflow-x: auto;
  flex-shrink: 0;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.emergency-bar::-webkit-scrollbar { display: none; }

.sos-btn {
  flex-shrink: 0; padding: 8px 14px;
  border-radius: 10px; border: none;
  font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
}

.sos-btn:active { transform: scale(0.95); }

.sos-red { background: var(--red-dim); color: var(--red); }
.sos-orange { background: var(--orange-dim); color: var(--orange); }
.sos-blue { background: var(--blue-dim); color: var(--blue); }
.sos-green { background: var(--accent-dim); color: var(--accent); }

/* CHAT */
.chat-area {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.message { max-width: 88%; animation: msgIn 0.25s ease-out; }

@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.bot { align-self: flex-start; }
.message.user { align-self: flex-end; }

.msg-bubble {
  padding: 12px 16px; border-radius: 16px;
  font-size: 14px; line-height: 1.65; white-space: pre-wrap;
}

.message.bot .msg-bubble {
  background: var(--surface2); color: var(--text);
  border-bottom-left-radius: 4px;
}

.message.user .msg-bubble {
  background: var(--accent); color: #000;
  border-bottom-right-radius: 4px; font-weight: 500;
}

.msg-label {
  font-size: 11px; font-weight: 600; color: var(--text2);
  margin-bottom: 4px; padding-left: 4px;
}

.message.user .msg-label { text-align: right; padding-right: 4px; }

/* TYPING */
.typing-indicator { display: flex; gap: 4px; padding: 6px 0; }

.typing-indicator span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text2); animation: pulse 1.2s infinite both;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

@keyframes pulse { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }

/* INPUT */
.input-area {
  padding: 12px 16px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex; gap: 10px; flex-shrink: 0;
}

.input-area input {
  flex: 1; padding: 12px 16px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 15px;
  outline: none; transition: border-color 0.2s;
}

.input-area input:focus { border-color: var(--accent); }
.input-area input::placeholder { color: var(--text2); }

.input-area button {
  width: 46px; height: 46px; border-radius: 12px;
  background: var(--accent); border: none;
  color: #000; font-size: 20px; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}

.input-area button:active { transform: scale(0.92); }

/* EMERGENCY DETAIL PANEL */
.panel-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8); z-index: 100;
  display: none; align-items: flex-end; justify-content: center;
}

.panel-overlay.active { display: flex; }

.panel {
  background: var(--surface); width: 100%; max-width: 600px;
  max-height: 85vh; border-radius: 20px 20px 0 0;
  overflow-y: auto; padding: 24px 20px;
  padding-bottom: calc(24px + env(safe-area-inset-bottom));
  animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.panel-handle {
  width: 36px; height: 4px; background: var(--border);
  border-radius: 2px; margin: 0 auto 16px;
}

.panel h2 {
  font-size: 20px; font-weight: 800; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}

.panel h3 {
  font-size: 15px; font-weight: 700; color: var(--accent);
  margin: 16px 0 8px; padding-top: 12px;
  border-top: 1px solid var(--border);
}

.panel h3:first-of-type { border-top: none; padding-top: 0; }

.panel p, .panel li {
  font-size: 14px; line-height: 1.7; color: var(--text);
  margin-bottom: 6px;
}

.panel ol, .panel ul {
  padding-left: 20px; margin-bottom: 12px;
}

.panel .warning {
  background: var(--red-dim); color: var(--red);
  padding: 10px 14px; border-radius: 10px;
  font-size: 13px; font-weight: 600; margin: 12px 0;
}

.panel .tip {
  background: var(--accent-dim); color: var(--accent);
  padding: 10px 14px; border-radius: 10px;
  font-size: 13px; font-weight: 600; margin: 12px 0;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">🛡️</div>
    <h1>Lifeline</h1>
  </div>
  <span class="offline-badge">OFFLINE READY</span>
</div>

<div class="emergency-bar">
  <button class="sos-btn sos-red" onclick="showPanel('cpr')">🫀 CPR</button>
  <button class="sos-btn sos-red" onclick="showPanel('choking')">😤 Choking</button>
  <button class="sos-btn sos-red" onclick="showPanel('bleeding')">🩸 Bleeding</button>
  <button class="sos-btn sos-orange" onclick="showPanel('burns')">🔥 Burns</button>
  <button class="sos-btn sos-orange" onclick="showPanel('fracture')">🦴 Fractures</button>
  <button class="sos-btn sos-blue" onclick="showPanel('tornado')">🌪️ Tornado</button>
  <button class="sos-btn sos-blue" onclick="showPanel('flood')">🌊 Flood</button>
  <button class="sos-btn sos-blue" onclick="showPanel('earthquake')">📳 Earthquake</button>
  <button class="sos-btn sos-blue" onclick="showPanel('fire')">🏠 House Fire</button>
  <button class="sos-btn sos-green" onclick="showPanel('water')">💧 Find Water</button>
  <button class="sos-btn sos-green" onclick="showPanel('shelter')">⛺ Shelter</button>
  <button class="sos-btn sos-green" onclick="showPanel('signal')">🆘 Signal Help</button>
</div>

<div class="chat-area" id="chatArea"></div>

<div class="input-area">
  <input type="text" id="chatInput" placeholder="Ask me anything..." autocomplete="off">
  <button onclick="sendMessage()" id="sendBtn">↑</button>
</div>

<!-- PANEL OVERLAY -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanel(event)">
  <div class="panel" id="panelContent" onclick="event.stopPropagation()">
    <div class="panel-handle"></div>
  </div>
</div>

<script>
// ================================================================
//  LIFELINE — Offline Survival & Emergency Assistant
//  Built for Cole. No API. No internet. Just knowledge.
// ================================================================

let isGenerating = false;
let conversationContext = [];
let lastTopic = '';

// ================================================================
//  EMERGENCY PANELS (instant-access reference cards)
// ================================================================
const panels = {
  cpr: `<h2>🫀 CPR — Adult</h2>
<div class="warning">Call 911 first if possible. If alone, do 2 minutes of CPR then call.</div>
<h3>Steps</h3>
<ol>
<li><strong>Check responsiveness.</strong> Tap shoulders firmly. Shout "Are you okay?" Look for breathing (chest rise) for no more than 10 seconds.</li>
<li><strong>Call 911</strong> or have someone do it. Put on speaker.</li>
<li><strong>Position.</strong> Place person flat on their back on a hard surface.</li>
<li><strong>Hand placement.</strong> Heel of one hand on center of chest (between nipples). Other hand on top, fingers interlocked.</li>
<li><strong>Compress.</strong> Push hard and fast — at least 2 inches deep. Rate: 100–120 per beat (think "Stayin' Alive" by Bee Gees).</li>
<li><strong>30 compressions, then 2 breaths.</strong> Tilt head back, lift chin, pinch nose, seal mouth, blow for 1 second each. Watch chest rise.</li>
<li><strong>Repeat.</strong> 30:2 cycle. Do NOT stop until help arrives or person starts breathing.</li>
</ol>
<h3>Child CPR (1–puberty)</h3>
<ol>
<li>Use ONE hand for compressions (about 2 inches deep).</li>
<li>Same rate — 100–120/min. Same 30:2 ratio.</li>
<li>If alone, do 2 minutes of CPR BEFORE calling 911.</li>
</ol>
<h3>Infant CPR (under 1)</h3>
<ol>
<li>Use TWO FINGERS on the breastbone just below the nipple line.</li>
<li>Compress about 1.5 inches deep.</li>
<li>Cover baby's mouth AND nose with your mouth for breaths.</li>
<li>30:2 ratio. Gentle breaths — just puffs.</li>
</ol>
<div class="tip">If you're untrained or uncomfortable with breaths, hands-only CPR (just compressions) is still effective for adults.</div>`,

  choking: `<h2>😤 Choking — Heimlich Maneuver</h2>
<div class="warning">If the person can cough forcefully, encourage them to keep coughing. Only intervene if they CANNOT cough, speak, or breathe.</div>
<h3>Adult / Child (standing)</h3>
<ol>
<li>Stand behind the person. Wrap arms around their waist.</li>
<li>Make a fist with one hand. Place thumb side against their upper abdomen, above the navel and below the ribcage.</li>
<li>Grasp your fist with your other hand.</li>
<li>Press hard inward and upward in quick thrusts. Repeat until object is expelled.</li>
</ol>
<h3>If the person goes unconscious</h3>
<ol>
<li>Lower them to the ground on their back.</li>
<li>Call 911.</li>
<li>Begin CPR. Before each set of breaths, look in the mouth for the object. If you see it, sweep it out with your finger.</li>
</ol>
<h3>Infant (under 1 year)</h3>
<ol>
<li>Lay baby face-down on your forearm, supporting the head.</li>
<li>Give 5 firm back blows between the shoulder blades with the heel of your hand.</li>
<li>Flip baby face-up. Give 5 chest thrusts with 2 fingers on the breastbone.</li>
<li>Alternate back blows and chest thrusts until object comes out or baby becomes unresponsive.</li>
</ol>
<h3>Choking alone — self-Heimlich</h3>
<ol>
<li>Make a fist above your navel.</li>
<li>Thrust inward and upward. Or lean over a chair back and thrust your abdomen against it.</li>
</ol>`,

  bleeding: `<h2>🩸 Severe Bleeding</h2>
<div class="warning">Heavy bleeding can kill in minutes. Act fast. Don't worry about infection — stop the blood first.</div>
<h3>Steps</h3>
<ol>
<li><strong>Apply direct pressure.</strong> Use a cloth, shirt, towel — anything. Press hard directly on the wound.</li>
<li><strong>Don't remove the cloth.</strong> If it soaks through, add more material on top and keep pressing.</li>
<li><strong>Elevate</strong> the injured limb above the heart if possible.</li>
<li><strong>Call 911.</strong></li>
<li><strong>If bleeding won't stop — tourniquet.</strong> Use a belt, strip of cloth, or rope. Tie 2–3 inches above the wound (between wound and heart). Tighten until bleeding stops. Note the time you applied it.</li>
</ol>
<h3>Nosebleed</h3>
<ol>
<li>Sit upright, lean FORWARD (not back).</li>
<li>Pinch the soft part of the nose shut for 10–15 minutes straight.</li>
<li>Don't check it — just keep pinching.</li>
</ol>
<h3>Puncture wound / impaled object</h3>
<ol>
<li><strong>DO NOT remove the object.</strong> It may be plugging the wound.</li>
<li>Stabilize the object with bulky dressings around it.</li>
<li>Control bleeding around the object.</li>
<li>Get to emergency room immediately.</li>
</ol>
<div class="tip">A tourniquet is a last resort but it saves lives. Don't be afraid to use one if direct pressure fails.</div>`,

  burns: `<h2>🔥 Burns</h2>
<h3>1st Degree (red, no blisters)</h3>
<ol>
<li>Cool under running water for 10–20 minutes.</li>
<li>Apply aloe vera or burn cream.</li>
<li>Take ibuprofen for pain.</li>
<li>Cover loosely with a sterile bandage.</li>
</ol>
<h3>2nd Degree (blisters, very painful)</h3>
<ol>
<li>Cool under running water for 15–20 minutes.</li>
<li>Do NOT pop blisters.</li>
<li>Cover with a non-stick sterile bandage.</li>
<li>Take pain medication. See a doctor if larger than 3 inches.</li>
</ol>
<h3>3rd Degree (white/charred, may be painless)</h3>
<ol>
<li><strong>Call 911 immediately.</strong></li>
<li>Do NOT apply water, ice, or ointments.</li>
<li>Cover loosely with a clean, dry cloth.</li>
<li>Elevate above heart if possible.</li>
<li>Watch for shock (pale skin, rapid breathing, confusion).</li>
</ol>
<h3>Chemical burn</h3>
<ol>
<li>Remove contaminated clothing.</li>
<li>Flush with large amounts of water for 20+ minutes.</li>
<li>Do NOT try to neutralize the chemical.</li>
</ol>
<div class="warning">Never use butter, toothpaste, or ice on burns. Cool running water only.</div>`,

  fracture: `<h2>🦴 Fractures & Broken Bones</h2>
<h3>Signs</h3>
<ul>
<li>Intense pain, swelling, bruising</li>
<li>Deformity or limb at wrong angle</li>
<li>Can't move or bear weight</li>
<li>Grinding sensation</li>
</ul>
<h3>What to do</h3>
<ol>
<li><strong>Immobilize.</strong> Don't try to straighten it. Splint it in the position you find it.</li>
<li><strong>Improvised splint:</strong> Use sticks, boards, rolled newspapers, or even a pillow. Tie with strips of cloth above and below the break.</li>
<li><strong>Ice</strong> wrapped in cloth — 20 min on, 20 off.</li>
<li><strong>Elevate</strong> above heart level.</li>
<li>Get medical help.</li>
</ol>
<h3>Open fracture (bone through skin)</h3>
<ol>
<li><strong>Call 911.</strong></li>
<li>Control bleeding with gentle pressure around (not on) the bone.</li>
<li>Cover wound with a moist, clean dressing.</li>
<li>Splint without pushing bone back in.</li>
<li>Treat for shock.</li>
</ol>
<div class="warning">Never try to push a bone back into place. Immobilize as-is and get help.</div>`,

  tornado: `<h2>🌪️ Tornado Safety</h2>
<h3>Warning signs</h3>
<ul>
<li>Dark, greenish sky</li>
<li>Large hail with no rain</li>
<li>Loud roar (like a freight train)</li>
<li>Rotating clouds / visible funnel</li>
</ul>
<h3>If you're in a building</h3>
<ol>
<li>Go to the <strong>lowest floor</strong> — basement is best.</li>
<li>Get to an <strong>interior room</strong> away from windows (bathroom, closet, hallway).</li>
<li>Get under a sturdy table or mattress.</li>
<li>Cover your head and neck with your arms.</li>
</ol>
<h3>If you're in a car</h3>
<ol>
<li><strong>Don't try to outrun it.</strong> Drive at right angles to its path if you can see it.</li>
<li>If you can't escape, park and get to a low ditch. Lie flat and cover your head.</li>
<li>Do NOT shelter under an overpass — wind accelerates there.</li>
</ol>
<h3>If you're outside</h3>
<ol>
<li>Find the lowest ground available — ditch, ravine.</li>
<li>Lie flat, face down. Cover head and neck.</li>
<li>Stay away from trees, cars, and structures.</li>
</ol>
<div class="tip">A tornado watch means conditions are favorable. A tornado WARNING means one has been spotted — take shelter NOW.</div>`,

  flood: `<h2>🌊 Flood Safety</h2>
<div class="warning">6 inches of moving water can knock you down. 12 inches can carry a vehicle. Never walk or drive through floodwater.</div>
<h3>Before / during</h3>
<ol>
<li><strong>Move to higher ground immediately.</strong> Don't wait.</li>
<li>Avoid walking in floodwater — it may be electrified by downed power lines.</li>
<li>Turn around, don't drown — never drive through flooded roads.</li>
<li>If trapped in a car in rising water, open the window and climb onto the roof.</li>
</ol>
<h3>If trapped in a building</h3>
<ol>
<li>Go to the highest floor. Do NOT go into an attic unless you can break through the roof.</li>
<li>Signal for help from a window or rooftop.</li>
<li>Call 911 and give your exact location.</li>
</ol>
<h3>Flash flood</h3>
<ol>
<li>Flash floods hit with almost no warning — seconds to minutes.</li>
<li>If you hear rushing water or see rising water, get to high ground NOW.</li>
<li>Never camp in a dry creek bed or canyon bottom.</li>
</ol>
<h3>After a flood</h3>
<ul>
<li>Don't drink tap water until authorities confirm it's safe.</li>
<li>Stay away from damaged buildings.</li>
<li>Watch for snakes and other animals displaced by water.</li>
</ul>`,

  earthquake: `<h2>📳 Earthquake</h2>
<h3>During — Drop, Cover, Hold On</h3>
<ol>
<li><strong>DROP</strong> to your hands and knees.</li>
<li><strong>COVER</strong> your head and neck under a sturdy desk or table. If no table, get against an interior wall and cover your head.</li>
<li><strong>HOLD ON</strong> until the shaking stops. If under a table, hold a leg.</li>
</ol>
<h3>If you're in bed</h3>
<p>Stay there. Cover your head with a pillow. Don't run outside.</p>
<h3>If you're outside</h3>
<ol>
<li>Move to an open area away from buildings, trees, and power lines.</li>
<li>Drop and cover your head.</li>
</ol>
<h3>If you're in a car</h3>
<ol>
<li>Pull over to a clear spot. Stay in the car.</li>
<li>Avoid bridges, overpasses, and power lines.</li>
<li>Set your parking brake.</li>
</ol>
<h3>After</h3>
<ul>
<li>Expect aftershocks. Drop, cover, hold each time.</li>
<li>Check for gas leaks (smell). If you smell gas, leave immediately and don't use lights or matches.</li>
<li>Stay out of damaged buildings.</li>
<li>Check on neighbors, especially elderly.</li>
</ul>
<div class="warning">Do NOT stand in a doorway — that's a myth. Tables are safer. Do NOT run outside during shaking.</div>`,

  fire: `<h2>🏠 House Fire</h2>
<h3>If you discover fire</h3>
<ol>
<li><strong>GET OUT.</strong> Don't try to fight it unless it's tiny and you have an extinguisher.</li>
<li>Alert everyone. Yell "FIRE!" as you leave.</li>
<li>Close doors behind you — this slows the fire.</li>
<li>Feel doors before opening. If hot, use another route.</li>
<li>Stay low — smoke rises. Crawl if needed.</li>
<li>Get out and call 911 from outside. Never go back in.</li>
</ol>
<h3>If trapped</h3>
<ol>
<li>Close the door. Seal gaps with cloth or tape.</li>
<li>Open a window. Signal with a flashlight or light-colored cloth.</li>
<li>Call 911 and tell them your exact location in the building.</li>
<li>Stay low near the floor where air is clearest.</li>
</ol>
<h3>If your clothes catch fire</h3>
<ol>
<li><strong>Stop.</strong> Don't run.</li>
<li><strong>Drop</strong> to the ground.</li>
<li><strong>Roll</strong> back and forth to smother flames.</li>
<li>Cover your face with your hands while rolling.</li>
</ol>
<h3>Fire extinguisher — PASS method</h3>
<ol>
<li><strong>P</strong>ull the pin.</li>
<li><strong>A</strong>im at the base of the fire.</li>
<li><strong>S</strong>queeze the handle.</li>
<li><strong>S</strong>weep side to side.</li>
</ol>`,

  water: `<h2>💧 Finding & Purifying Water</h2>
<div class="warning">Dehydration can kill in 3 days. Finding water is your top survival priority after immediate safety.</div>
<h3>Finding water</h3>
<ul>
<li><strong>Follow gravity.</strong> Water flows downhill. Head to valleys, low points.</li>
<li><strong>Listen.</strong> Running water can be heard from a distance.</li>
<li><strong>Follow animals.</strong> Birds fly toward water at dawn/dusk. Animal trails often lead to water.</li>
<li><strong>Insects</strong> (especially bees) are usually within 3 miles of water.</li>
<li><strong>Morning dew.</strong> Tie cloth around your ankles and walk through grass at dawn. Wring out into a container.</li>
<li><strong>Rain collection.</strong> Use any container, tarp, plastic bag.</li>
<li><strong>Plants.</strong> Collect water from plant transpiration — tie a bag around a leafy branch in the sun.</li>
</ul>
<h3>Purifying water</h3>
<ol>
<li><strong>Boiling</strong> — the best method. Bring to a rolling boil for 1 minute (3 min above 6,500 ft elevation).</li>

function findBestResponse(input) {
  const lower = input.toLowerCase().trim();
  let bestMatch = null;
  let bestScore = 0;

  for (const [key, entry] of Object.entries(KB)) {
    let score = 0;
    for (const kw of entry.keywords) {
      if (kw.startsWith('^') || kw.endsWith('$')) {
        if (new RegExp(kw, 'i').test(lower)) score += 10;
      } else if (lower.includes(kw)) {
        score += kw.split(' ').length * 3;
      } else {
        // Partial word matching
        const words = kw.split(' ');
        for (const w of words) {
          if (w.length > 3 && lower.includes(w)) score += 1;
        }
      }
    }
    if (score > bestScore) {
      bestScore = score;
      bestMatch = entry;
      lastTopic = key;
    }
  }

  if (bestScore >= 3) return bestMatch.response;

  // Fallback - check for question patterns
  if (/what should i do|how do i|help me|i need|how to/.test(lower)) {
    return `I want to help. Can you be a bit more specific? I'm strongest with:

• First aid (CPR, bleeding, burns, bites, fractures)
• Medical emergencies (heart attack, stroke, poisoning, allergies)
• Natural disasters (tornadoes, floods, earthquakes, fires)
• Survival (water, shelter, fire, navigation, food)
• Self-defense and personal safety
• Emergency preparedness

Or tap one of the quick-access buttons at the top for instant guides.`;
  }

  if (/joke|funny|bored|entertain/.test(lower)) {
    const jokes = [
      "I'd tell you a survival joke, but I'm not sure you're prepared for it.",
      "What do you call a bear with no teeth? A gummy bear. Not useful in an emergency, but now you know.",
      "I tried to make a belt out of watches once. Complete waist of time. ...I'm better at first aid.",
      "Why don't scientists trust atoms? They make up everything. Kind of like my entire personality."
    ];
    return jokes[Math.floor(Math.random() * jokes.length)];
  }

  // Smart fallback
  return `I don't have a great answer for that specific question — my brain is built for emergencies and survival, not everything under the sun. But I'm solid on:

• Medical emergencies & first aid
• Natural disaster response
• Wilderness survival
• Self-defense
• Emergency preparedness

Try asking something in those areas, or hit the quick-access buttons above. What do you need?`;
}

  const div = document.createElement('div');
  div.className = 'message bot'; div.id = 'typingMsg';
  div.innerHTML = `<div class="msg-label">Lifeline</div><div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}

function sendMessage() {
  if (isGenerating) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, true);
  input.value = '';
  isGenerating = true;

  showTyping();
  const delay = 300 + Math.random() * 500;
  setTimeout(() => {
    removeTyping();
    const response = findBestResponse(text);
    addMessage(response, false);
    isGenerating = false;
  }, delay);
}

// ================================================================
//  EMERGENCY PANELS
// ================================================================
function showPanel(id) {
  const overlay = document.getElementById('panelOverlay');
  const content = document.getElementById('panelContent');
  content.innerHTML = `<div class="panel-handle"></div>${panels[id] || '<p>Guide not found.</p>'}`;
  overlay.classList.add('active');
}

function closePanel(e) {
  if (e.target === document.getElementById('panelOverlay')) {
    document.getElementById('panelOverlay').classList.remove('active');
  }
}

// ================================================================
//  INIT
// ================================================================
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
});

// Welcome message
addMessage(`Hey Cole. I'm Lifeline — your offline emergency assistant. No internet needed, ever.

Ask me anything about first aid, survival, disasters, self-defense, or tap the buttons above for instant guides.

I'm always here.`, false);

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
